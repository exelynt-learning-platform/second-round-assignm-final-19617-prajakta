# Server
server.port=8080

# ─── Database (PostgreSQL for production) ────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA ─────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ─────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ─── Stripe ──────────────────────────────────────────────────────────────────
stripe.api.key=${STRIPE_SECRET_KEY:sk_test_your_stripe_secret_key}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_your_webhook_secret}

# ─── App ─────────────────────────────────────────────────────────────────────
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.ecommerce=DEBUG
logging.level.org.springframework.security=INFO
